  <div class="card" role="main" aria-label="年龄验证">
    <div class="age-icon">⛔</div>

    <div class="divider"></div>

      <span style="opacity:0.9;">您是否已满18周岁？</span>

      <button class="btn btn-primary" id="btnYes" aria-label="已满18岁，继续访问">已满</button>

    </div>
  </div>

  <script>
    (function() {
      'use strict';

      const URL_OVER18 = 'http://360ka.cn/dyxe6tRt#83697';
      const URL_UNDER18 = 'https://b23.tv/kEPznAz';

      const btnYes = document.getElementById('btnYes');
      const btnNo = document.getElementById('btnNo');

      function redirectTo(url) {
        try {
          const target = new URL(url, window.location.origin);
          window.location.replace(target.href);
        } catch (_) {
          window.location.href = url;
        }
      }

      btnYes.addEventListener('click', function() {
        redirectTo(URL_OVER18);
      });

      btnNo.addEventListener('click', function() {
        redirectTo(URL_UNDER18);
      });

      btnYes.addEventListener('contextmenu', (e) => e.preventDefault());
      btnNo.addEventListener('contextmenu', (e) => e.preventDefault());
    })();
  </script>
